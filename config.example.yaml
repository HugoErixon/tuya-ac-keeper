database:
  path: data/ac_keeper.sqlite

api:
  host: 127.0.0.1
  port: 8089

controller:
  target_c: 21.5
  hysteresis_c: 0.4
  poll_seconds: 30
  min_cycle_seconds: 180
  aggregate: average
  heat_enabled: false
  dry_run: true

pre_cool:
  enabled: false
  dashboard_url: http://127.0.0.1:3000
  timezone: Europe/Stockholm
  cooling_rate_c_per_hour: 1.2
  outside_heat_factor: 0.10
  sleeper_heat_buffer_c: 0.5
  min_lead_minutes: 10
  schedule_refresh_seconds: 300
  weather_refresh_seconds: 900

ac:
  provider: simulated
  name: bedroom_ac
  device_id: ""
  address: ""
  local_key: ""
  version: "3.3"
  temperature_scale: 1.0
  dps:
    power: "1"
    mode: "2"
    target_temperature: "3"
    current_temperature: "4"
  modes:
    cool: cold
    heat: hot
    auto: auto
    fan: wind

sensors:
  - name: room_simulated
    provider: simulated
    weight: 1.0
    offset_c: 0.0

  # Example for a Tuya temperature sensor.
  # - name: desk_sensor
  #   provider: tinytuya
  #   device_id: "bf..."
  #   address: "192.168.1.42"
  #   local_key: "..."
